<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every Toy Has a Story</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--sky:#1B6CA8;--cloud:#E8F4FD;--sun:#F5C842;--grass:#2D8A4E;--dark:#1A1A2E;--mid:#4A4A6A;--soft:#8888AA;--bg:#F0F4FF;--white:#FFFFFF;--border:#DDE3F0;--shadow:0 4px 20px rgba(27,108,168,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:#5BB8E8;color:var(--dark);min-height:100vh;line-height:1.6;position:relative}
.comic-bg{position:absolute;top:0;left:0;width:100%;height:1400px;z-index:0;pointer-events:none;overflow:hidden}
.comic-bg svg{width:100%;height:100%;display:block}
section{position:relative;z-index:1}

/* LANDING */
.landing{min-height:100vh;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;overflow:hidden}
.cloud-bg{position:absolute;inset:0;pointer-events:none;opacity:1}
.cloud-bg svg{width:100%;height:100%}
.stars{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1.5px 1.5px at 10% 15%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 30% 50%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(2px 2px at 60% 10%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 80% 35%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 90% 65%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 70% 80%,rgba(255,255,255,.4) 0%,transparent 100%)}
.chars-row{margin-bottom:24px;display:flex;gap:14px;align-items:center;justify-content:center}
.chars-row img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18))}
.chars-row.emoji-fallback{font-size:clamp(36px,8vw,64px)}
.landing h1{font-family:'Prompt',sans-serif;font-size:clamp(22px,5vw,40px);font-weight:700;color:#1A1A2E;line-height:1.25;margin-bottom:10px;text-shadow:0 2px 0 rgba(255,255,255,.6),0 4px 10px rgba(255,255,255,.4)}
.landing h1 span{color:#E04A2F}
.landing-sub1{color:#1A1A2E;font-size:clamp(15px,2.5vw,18px);font-weight:600;margin-bottom:6px}
.landing-sub2{color:#2A3A55;font-size:clamp(13px,2vw,15px);margin-bottom:32px}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:36px}
.tag{background:rgba(255,255,255,.55);border:1px solid rgba(26,26,46,.18);color:#1A1A2E;padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.tag img{width:18px;height:18px;object-fit:contain}
.btn-start{background:var(--sun);color:#1A1A2E;border:none;padding:16px 44px;font-family:'Prompt',sans-serif;font-size:17px;font-weight:700;border-radius:999px;cursor:pointer;box-shadow:0 6px 24px rgba(245,200,66,.4);transition:transform .15s,box-shadow .15s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(245,200,66,.5)}

/* QUIZ */
.quiz-wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px}
.prog-row{display:flex;align-items:center;gap:14px;margin-bottom:30px}
.prog-bar{flex:1;height:6px;background:#DDE3F0;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--grass));border-radius:999px;transition:width .4s ease}
.prog-label{font-size:13px;color:var(--soft);white-space:nowrap}
.q-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:36px 30px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.q-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sky);margin-bottom:10px}
.q-text{font-family:'Prompt',sans-serif;font-size:clamp(17px,3vw,21px);font-weight:600;line-height:1.4;color:var(--dark);margin-bottom:26px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#F7F9FF;border:2px solid var(--border);border-radius:12px;cursor:pointer;font-size:15px;line-height:1.5;color:var(--dark);text-align:left;transition:border-color .15s,background .15s,transform .1s;font-family:'Sarabun',sans-serif;width:100%}
.choice:hover{border-color:var(--sky);background:var(--cloud);transform:translateX(3px)}
.choice.selected{border-color:var(--sky);background:var(--cloud);font-weight:600}
.choice-num{min-width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--soft);flex-shrink:0;transition:.15s}
.choice.selected .choice-num,.choice:hover .choice-num{background:var(--sky);color:#fff}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:26px}
.btn-back{padding:10px 22px;border-radius:999px;border:2px solid var(--border);background:transparent;font-size:14px;font-weight:600;color:var(--soft);cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s}
.btn-back:hover{border-color:var(--sky);color:var(--sky)}
.btn-back:disabled{opacity:.3;cursor:default}
.btn-fwd{padding:10px 28px;border-radius:999px;border:none;background:var(--sky);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Prompt',sans-serif;transition:.15s}
.btn-fwd:hover{background:#155a90}
.btn-fwd:disabled{background:#ccc;cursor:default}

/* PROFILE */
.profile-wrap{max-width:560px;margin:0 auto;padding:48px 24px 80px}
.profile-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:36px 32px}
.profile-title{font-family:'Prompt',sans-serif;font-size:22px;font-weight:700;color:var(--dark);margin-bottom:6px}
.profile-sub{font-size:14px;color:var(--soft);margin-bottom:28px}
.field-label{font-size:13px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.field-group{margin-bottom:22px}
.radio-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.radio-grid.single{grid-template-columns:1fr}
.radio-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;color:var(--dark);transition:border-color .15s,background .15s;user-select:none}
.radio-opt:hover{border-color:var(--sky);background:var(--cloud)}
.radio-opt.active{border-color:var(--sky);background:var(--cloud);font-weight:600}
.radio-opt input{display:none}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:.15s;position:relative}
.radio-opt.active .radio-dot{border-color:var(--sky);background:var(--sky)}
.radio-opt.active .radio-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#fff;border-radius:50%}
.email-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:'Sarabun',sans-serif;color:var(--dark);outline:none;transition:border-color .15s}
.email-input:focus{border-color:var(--sky)}
.email-skip{font-size:12px;color:var(--soft);margin-top:6px;display:block}
.btn-see-result{width:100%;padding:16px;background:linear-gradient(135deg,var(--sky),var(--grass));color:#fff;border:none;border-radius:12px;font-family:'Prompt',sans-serif;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-see-result:hover{opacity:.9}

/* RESULT */
.result-wrap{max-width:720px;margin:0 auto;padding:40px 20px 80px}
.result-hero{border-radius:20px;padding:44px 32px 36px;text-align:center;color:#fff;margin-bottom:20px}
.result-char{font-size:72px;margin-bottom:12px;display:block}
.result-char-img{width:128px;height:128px;object-fit:contain;margin-bottom:8px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.25))}
.result-group-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.7;margin-bottom:6px}
.result-name{font-family:'Prompt',sans-serif;font-size:clamp(24px,5vw,36px);font-weight:700;line-height:1.2;margin-bottom:8px}
.result-theme{font-size:14px;opacity:.8;margin-bottom:14px}
.result-desc{font-size:clamp(14px,2vw,16px);line-height:1.7;opacity:.92;max-width:520px;margin:0 auto}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:580px){.section-grid{grid-template-columns:1fr}}
.res-card{background:var(--white);border-radius:16px;padding:22px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.res-card.full{grid-column:1/-1}
.res-card h3{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.res-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.res-list li{font-size:14px;line-height:1.55;color:var(--mid);padding-left:16px;position:relative}
.res-list li::before{content:'▸';position:absolute;left:0;color:var(--sky);font-size:11px}
/* Product grid */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.prod-card{background:#fff;border-radius:12px;padding:10px 8px;border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;text-align:center;min-width:0;transition:.15s}
.prod-card:hover{border-color:var(--sky);box-shadow:0 4px 12px rgba(27,108,168,.13);transform:translateY(-2px)}
.prod-emoji{font-size:26px;margin-bottom:4px;display:block;line-height:1.2}
.prod-cat{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--sky);margin-bottom:2px}
.prod-name{font-size:11px;font-weight:600;color:var(--dark);line-height:1.35;flex:1;word-wrap:break-word}
.prod-link{display:block;margin-top:7px;font-size:10.5px;color:#fff;text-decoration:none;font-weight:700;padding:5px 8px;border-radius:8px;text-align:center;transition:opacity .15s;width:100%}
.prod-link:hover{opacity:.85}
.prod-link:hover{opacity:.85}
/* Every Toy Has a Story banner */
.ts-banner{border-radius:16px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:center;gap:16px;text-decoration:none;color:#fff;transition:opacity .15s;background:linear-gradient(135deg,#1A1A2E,#2471A3);border:2px solid rgba(255,255,255,.1)}
.ts-banner:hover{opacity:.9}
.retake-row{text-align:center;margin-top:32px}
.btn-retake{padding:12px 32px;border-radius:999px;border:2px solid var(--border);background:transparent;font-size:15px;font-weight:600;color:var(--soft);cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s}
.btn-retake:hover{border-color:var(--sky);color:var(--sky)}


/* Result infographic */
.result-infographic-wrap{border-radius:20px;overflow:hidden;margin-bottom:0;background:transparent;text-align:center;position:relative}
.result-infographic{width:100%;max-width:600px;height:auto;display:block;margin:0 auto;border-radius:16px;-webkit-touch-callout:default;-webkit-user-select:none;user-select:none;pointer-events:auto}

/* Share section */
.share-section{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.share-title{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;color:var(--dark);margin-bottom:12px;text-align:center}
.share-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin:0 auto}
.share-btn{padding:9px 14px;border-radius:999px;border:2px solid var(--border);background:#F7F9FF;font-size:13px;font-weight:600;color:var(--dark);cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s;white-space:nowrap}
.share-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.share-ig{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;border-color:transparent}
.share-tt{background:#000;color:#fff;border-color:#000}
.share-line{background:#06C755;color:#fff;border-color:#06C755}
.share-x{background:#000;color:#fff;border-color:#000}
.share-copy{background:#6C757D;color:#fff;border-color:#6C757D}
.share-save{background:#28A745;color:#fff;border-color:#28A745}

/* ══ MOBILE / SMARTPHONE FRIENDLY ══════════════════════════════ */
@media (max-width: 600px) {
  /* Quiz wrap */
  .quiz-wrap { padding: 20px 14px 60px; }
  .profile-wrap { padding: 24px 14px 60px; }
  .result-wrap { padding: 20px 14px 60px; }

  /* Landing */
  .landing { padding: 32px 16px 48px; }
  .landing h1 { font-size: clamp(20px,7vw,32px); }
  .landing-sub1 { font-size: 15px; }
  .landing-sub2 { font-size: 13px; }
  .tag-row { gap: 6px; }
  .tag { font-size: 12px; padding: 4px 10px; }
  .btn-start { padding: 14px 32px; font-size: 16px; }

  /* chars row */
  .chars-row img { width: 52px !important; height: 52px !important; }

  /* Question card */
  .q-card { padding: 24px 16px; border-radius: 16px; }
  .q-text { font-size: 16px; margin-bottom: 18px; }
  .choice { padding: 12px 14px; font-size: 14px; }
  .choice-num { min-width: 24px; height: 24px; font-size: 11px; }
  .nav-row { margin-top: 20px; }
  .btn-back { padding: 9px 18px; font-size: 13px; }
  .btn-fwd { padding: 9px 22px; font-size: 13px; }

  /* Profile card */
  .profile-card { padding: 24px 16px; }
  .radio-grid { grid-template-columns: 1fr !important; gap: 7px; }
  .radio-opt { padding: 10px 12px; font-size: 13px; }

  /* Result */
  .result-infographic { border-radius: 12px; }
  .section-grid { grid-template-columns: 1fr !important; gap: 10px; }
  .res-card { padding: 16px 14px; }
  .res-card.full { grid-column: 1 !important; }
  .prod-grid { grid-template-columns: repeat(3,1fr) !important; gap: 8px; }
  .prod-card { padding: 12px; }
  .prod-name { font-size: 12.5px; }
  .prod-link { font-size: 11px; padding: 5px 10px; }

  /* Every Toy Has a Story top banner */
  .ts-banner-top { padding: 14px 14px; gap: 10px; border-radius: 12px; }
  .ts-banner-icon { font-size: 28px !important; }
  .ts-banner-text .t1 { font-size: 13px; }
  .ts-banner-text .t2 { font-size: 11px; }
  .ts-banner-cta { font-size: 11px; padding: 6px 12px; white-space: nowrap; }

  /* Share section */
  .share-section { padding: 16px 14px; }
  .share-title { font-size: 14px; margin-bottom: 10px; }
  .share-row { gap: 6px; }
  .share-btn { padding: 8px 12px; font-size: 12px; }

  /* Retake button */
  .btn-retake { padding: 10px 24px; font-size: 14px; }
  .retake-row { margin-top: 24px; }

  /* Progress */
  .prog-row { margin-bottom: 20px; }
  .prog-label { font-size: 12px; }
}

@media (max-width: 380px) {
  .share-row { gap: 5px; }
  .share-btn { padding: 7px 10px; font-size: 11px; }
  .prod-grid { grid-template-columns: repeat(2,1fr) !important; }
}

/* Top combo box: banner + products in 1 card */
.top-combo-box{background:#fff;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.08);overflow:hidden;margin-bottom:14px}
.ts-banner-top{display:flex;align-items:center;gap:14px;padding:16px 18px;background:linear-gradient(135deg,#1A1A2E,#2471A3);text-decoration:none;color:#fff;transition:opacity .15s}
.ts-banner-top:hover{opacity:.9}
.ts-banner-icon{font-size:30px;flex-shrink:0}
.ts-banner-text .t1{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700}
.ts-banner-text .t2{font-size:11px;opacity:.8;margin-top:2px}
.ts-banner-cta{margin-left:auto;background:var(--sun);color:#1A1A2E;padding:7px 14px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.prod-combo-header{padding:14px 16px 0}
.prod-combo-header h3{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.top-combo-box .prod-grid{padding:10px 14px 16px}

/* Screenshot hint below infographic */
.screenshot-hint{text-align:center;padding:8px 0 14px;font-size:12px;color:var(--soft);font-style:italic}
.screenshot-hint strong{color:var(--sky);font-style:normal}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- GLOBAL SOFT CLOUD SKY BACKGROUND -->
<div class="comic-bg">
  <svg viewBox="0 0 800 1400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="1400" fill="#C9E8F7"/>

    <defs>
      <filter id="cloudShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#8FB9CE" flood-opacity="0.55"/>
      </filter>
    </defs>

    <!-- soft puffy cloud -->
    <g id="puffCloud" filter="url(#cloudShadow)">
      <path d="M -70 14
               Q -78 -14 -50 -22
               Q -44 -46 -14 -42
               Q 4 -56 30 -42
               Q 56 -48 66 -24
               Q 86 -20 82 4
               Q 84 22 62 22
               L -54 22
               Q -76 22 -70 14 Z"
            fill="#FFFFFF"/>
    </g>

    <!-- ===== PLACEMENT ===== -->
    <use href="#puffCloud" x="120" y="40"/>
    <use href="#puffCloud" x="630" y="120"/>
    <use href="#puffCloud" x="70" y="240"/>
    <use href="#puffCloud" x="420" y="420"/>
    <use href="#puffCloud" x="120" y="690"/>
    <use href="#puffCloud" x="600" y="830"/>
    <use href="#puffCloud" x="240" y="1040"/>
    <use href="#puffCloud" x="660" y="1180"/>
    <use href="#puffCloud" x="60" y="1280"/>
    <use href="#puffCloud" x="400" y="100"/>
    <use href="#puffCloud" x="700" y="500"/>
    <use href="#puffCloud" x="60" y="950"/>
    <use href="#puffCloud" x="500" y="1280"/>
    <use href="#puffCloud" x="780" y="780"/>
  </svg>
</div>

<!-- LANDING -->
<section id="page-landing">
<div class="landing">
  <div class="chars-row" id="chars-row">
    <img id="icon-W" src="" alt="hat" style="width:80px;height:56px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))"/>
    <img id="icon-B" src="" alt="rocket" style="width:56px;height:80px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))"/>
    <img id="icon-R" src="" alt="rex" style="width:64px;height:78px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))"/>
    <img id="icon-F" src="" alt="fork" style="width:56px;height:80px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))"/>
  </div>
  <h1>Every <span style="color:#FF8C00">Toy</span> Has a Story: What's Yours?</h1>
  <div class="landing-sub1">หาไลฟ์สไตล์ที่ใช่ตรงกับตัวคุณ</div>
  <div class="landing-sub2">ตอบ 10 คำถาม · ค้นพบ persona ของคุณ</div>
  <div class="tag-row">
    <span class="tag" id="tag-W">🤠 Community Keeper</span>
    <span class="tag" id="tag-B">🚀 Trendsetter</span>
    <span class="tag" id="tag-R">🦖 Self-Reliant Believer</span>
    <span class="tag" id="tag-F">🍴 Discovery Seeker</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">เริ่ม Quiz เลย! 🚀</button>
</div>
</section>

<!-- QUIZ -->
<section id="page-quiz" class="hidden">
<div class="quiz-wrap">
  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">1 / 10</div>
  </div>
  <div class="q-card" id="q-card"></div>
</div>
</section>

<!-- PROFILE (หลัง quiz) -->
<section id="page-profile" class="hidden">
<div class="profile-wrap">
  <div class="profile-card">
    <div class="profile-title">🎉 เกือบถึงแล้ว!</div>
    <div class="profile-sub">บอกเราอีกนิดเพื่อให้แนะนำสิ่งที่ใช่สำหรับคุณได้ดียิ่งขึ้น ไม่บังคับทุกข้อ</div>
    <div class="field-group">
      <label class="field-label">เพศ</label>
      <div class="radio-grid" id="gender-group">

    persona: currentPersona

function postToSheet(payload) {
  if (!SHEET_URL || SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return;
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).catch(function(){});
}

// ── QUIZ ──────────────────────────────────────────────────────────
function startQuiz() {
  current = 0; answers = {}; currentPersona = '';
  goTo('page-quiz');
  renderQ();
}

function renderQ() {
  var q = QUESTIONS[current], total = QUESTIONS.length;
  document.getElementById('prog-fill').style.width = (current/total*100)+'%';
  document.getElementById('prog-label').textContent = (current+1)+' / '+total;
  var ch = q.choices.map(function(c,i){
    var sel = answers[current]===c.key ? 'selected' : '';
    return '<button class="choice '+sel+'" onclick="selA(\''+c.key+'\',this)">'+
      '<span class="choice-num">'+(i+1)+'</span>'+
      '<span>'+c.text+'</span></button>';
  }).join('');
  var isLast = current === total-1;
  document.getElementById('q-card').innerHTML =
    '<div class="q-eyebrow">คำถามที่ '+(current+1)+' จาก '+total+'</div>'+
    '<div class="q-text">'+q.text+'</div>'+
    '<div class="choices">'+ch+'</div>'+
    '<div class="nav-row">'+
      '<button class="btn-back" onclick="prevQ()" '+(current===0?'disabled':'')+'>← ย้อนกลับ</button>'+
      '<button class="btn-fwd" id="btn-fwd" onclick="'+(isLast?'goToProfile()':'nextQ()')+'" '+
        (answers[current]===undefined?'disabled':'')+'>'+
        (isLast?'ถัดไป →':'ถัดไป →')+
      '</button>'+
    '</div>';
}

function selA(key, btn) {
  answers[current] = key;
  document.querySelectorAll('.choice').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  document.getElementById('btn-fwd').removeAttribute('disabled');
}
function nextQ() { if(current < QUESTIONS.length-1){ current++; renderQ(); } }
function prevQ() { if(current > 0){ current--; renderQ(); } }
function goToProfile() { goTo('page-profile'); }

// ── PROFILE ───────────────────────────────────────────────────────
function pick(el, group) {
  document.querySelectorAll('#'+group+'-group .radio-opt').forEach(function(o){ o.classList.remove('active'); });
  el.classList.add('active');
  profile[group] = el.querySelector('input').value;
}

// ── SCORING — Option A tiebreaker ────────────────────────────────
function calcPersona() {
  var sc = {W:0, B:0, R:0, F:0};
  Object.entries(answers).forEach(function(e) {
    var idx = parseInt(e[0]);
    // Q9(idx=8) และ Q10(idx=9) มีน้ำหนัก x2 เป็น tiebreaker
    var w = (idx === 8 || idx === 9) ? 2 : 1;
    sc[e[1]] = (sc[e[1]]||0) + w;
  });
  // Sort by score desc
  var sorted = Object.entries(sc).sort(function(a,b){ return b[1]-a[1]; });
  var top = sorted[0], second = sorted[1];
  // ถ้ายังเสมออยู่หลัง x2 → ดู Q10 เป็น deciding vote
  if (top[1] === second[1]) {
    return answers[9] || sorted[0][0];
  }
  return top[0];
}

function copyResultLink() {
  var url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      alert('คัดลอก link แล้ว! 📋');
    });
  } else {
    var el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('คัดลอก link แล้ว! 📋');
  }
  trackClick('copy_link', url);
}

function saveResultImage(key) {
  var img = document.getElementById('result-infographic');
  if (!img) { alert('ไม่พบรูป'); return; }
  var a = document.createElement('a');
  a.href = img.src;
  a.download = 'toystory-quiz-'+key+'.webp';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  trackClick('save_image', key);
}

function initCharImages(){
  if(typeof CHAR_IMG!=='undefined'){
    ['W','B','R','F'].forEach(function(k){
      var el=document.getElementById('icon-'+k);
      if(el&&CHAR_IMG[k]) el.src=CHAR_IMG[k];
    });
  }
}
document.addEventListener('DOMContentLoaded', initCharImages);

</script>
